name: publish cerebrum-cloud-push

on:
  push:
    tags:
      - "cloud-push-v*"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/cerebrum-cloud
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest -q
      - run: ruff check .
      - run: mypy src

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('integrations/cerebrum-cloud/pyproject.toml', 'rb'))['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#cloud-push-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build
        run: |
          pip install build
          cd integrations/cerebrum-cloud
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: integrations/cerebrum-cloud/dist
